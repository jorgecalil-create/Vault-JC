<script>

const PASSWORD = "1$=10$ NGU";

const entered = prompt("Enter the Vault Password");

if (entered !== PASSWORD) {

    document.body.innerHTML = `
    <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#f8f4ed;
        font-family:Inter,sans-serif;
        font-size:40px;
        color:#444;">
        Access Denied
    </div>
    `;

    throw new Error("Wrong Password");

}

const mission = document.getElementById("mission");
const goals = document.getElementById("goals");

mission.value = localStorage.getItem("mission") || "";
goals.value = localStorage.getItem("goals") || "";

mission.addEventListener("input", () => {
    localStorage.setItem("mission", mission.value);
});

goals.addEventListener("input", () => {
    localStorage.setItem("goals", goals.value);
});

</script>
